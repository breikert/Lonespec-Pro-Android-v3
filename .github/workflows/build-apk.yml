name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel

      - name: Install Android SDK components and accept licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.2.9519653"

      - name: Verify Android Build Tools
        run: |
          ls -la "$ANDROID_HOME/build-tools"
          ls -la "$ANDROID_HOME/build-tools/35.0.0"
          test -f "$ANDROID_HOME/build-tools/35.0.0/aidl" || test -f "$ANDROID_HOME/build-tools/35.0.0/aidl.exe"

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0" buildozer

      - name: Clean old Buildozer cache
        run: |
          rm -rf ~/.buildozer

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LonespecPro-Android-v3-debug
          path: bin/*.apk
